name: Generate Contribution Calendar

on:
  schedule:
    - cron: "0 1 * * *" # Every day at 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: output
          fetch-depth: 0

      - name: Generate contribution calendar SVG
        uses: nicedoc/github-contribution-calendar-readme@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          username: Yogeshnagre00
          output: github-contribution-grid-calendar.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-calendar.svg
          git diff --cached --quiet || git commit -m "chore: update contribution calendar"
          git push
